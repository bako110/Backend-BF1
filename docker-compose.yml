services:

  mongo:
    image: mongo:7.0
    container_name: bf1_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DBNAME:-bf1_db}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bf1_backend
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Remplace l'URI MongoDB Atlas par le MongoDB local du compose
      MONGODB_URI: mongodb://mongo:27017/${MONGODB_DBNAME:-bf1_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: "8000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./temp_uploads:/app/temp_uploads
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
  mongo_config:
